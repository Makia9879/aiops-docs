services:
  headroom:
    image: ${HEADROOM_IMAGE:-headroom:local}
    build:
      context: .
      dockerfile: Dockerfile.headroom
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-registry.cn-hangzhou.aliyuncs.com/makia_docker/python:3.13-slim}
        HEADROOM_EXTRAS: ${HEADROOM_EXTRAS:-all}
    platform: ${HEADROOM_PLATFORM:-linux/amd64}
    container_name: headroom
    restart: unless-stopped
    environment:
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_WORKSPACE_DIR: /home/nonroot/.headroom
      HEADROOM_CONFIG_DIR: /home/nonroot/.headroom/config
      OPENAI_TARGET_API_URL: ${OPENAI_TARGET_API_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${HEADROOM_PORT:-8787}:8787"
    volumes:
      - headroom_data:/home/nonroot/.headroom
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8787/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  headroom_data:
